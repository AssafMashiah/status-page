name = "status-page"
type = "javascript"
account_id = ""
pages_build_output_dir = "."
compatibility_date = "2024-03-05"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }

[[d1_databases]]
binding = "DB"
database_name = "status-logs"
database_id = ""

[build]
command = "npm install"
cwd = "."

[build.upload]
format = "service-worker"
